<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela Mundial 2026</title>

    <link rel="stylesheet" href="css/styles.css">

    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body>

    <header>
        <h1>🏆 Quiniela Mundial 2026</h1>
    </header>

    <!-- TOP 3 -->
    <section>
        <h2>🥇 Top 3</h2>

        <div class="top3" id="top3">

            <div class="tarjeta-top oro">
                🥇 Cargando...
            </div>

            <div class="tarjeta-top plata">
                🥈 Cargando...
            </div>

            <div class="tarjeta-top bronce">
                🥉 Cargando...
            </div>

        </div>
    </section>

    <!-- RANKING -->
    <section>

        <h2>📊 Ranking General</h2>

        <table id="tablaRanking">

            <thead>
                <tr>
                    <th>Pos.</th>
                    <th>Participante</th>
                    <th>Puntos</th>
                </tr>
            </thead>

            <tbody id="rankingBody">
            </tbody>

        </table>

    </section>

    <!-- PARTICIPANTES -->
    <section>

        <h2>👥 Participantes</h2>

        <div id="usuarios">
        </div>

    </section>

    <!-- DETALLE -->
    <section>

        <h2>📋 Detalle de Quiniela</h2>

        <div id="detalleUsuario">

            <p>
                Selecciona un participante para ver sus pronósticos.
            </p>

        </div>

    </section>

    <script src="js/app.js"></script>

</body>

</html>
